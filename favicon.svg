<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1714"/>
      <stop offset="100%" stop-color="#2c2720"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d880"/>
      <stop offset="50%" stop-color="#c9973a"/>
      <stop offset="100%" stop-color="#a8762a"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Subtle gold border -->
  <rect x="1" y="1" width="30" height="30" rx="5.5" fill="none" stroke="#c9973a" stroke-width="0.8" opacity="0.55"/>
  <!-- A5 mark -->
  <text x="16" y="23.5" font-family="Georgia, serif" font-size="19" font-weight="700" text-anchor="middle" fill="url(#gold)" letter-spacing="-0.5">A5</text>
</svg>
